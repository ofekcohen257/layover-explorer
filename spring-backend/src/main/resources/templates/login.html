<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: header('Login')}"></head>
<body>
    <div th:replace="~{layout :: body(content=~{::content})}">
        <div th:fragment="content">
            <div class="auth-container">
                <div class="card">
                    <div class="auth-header">
                        <h2 class="auth-title">Welcome Back</h2>
                        <p class="auth-subtitle">Log in to search flights and customize layovers</p>
                    </div>

                    <!-- Alerts -->
                    <div th:if="${param.error}" class="alert alert-danger">
                        <i class="fa-solid fa-triangle-exclamation"></i>
                        <span>Invalid email or password.</span>
                    </div>

                    <div th:if="${param.logout}" class="alert alert-success">
                        <i class="fa-solid fa-circle-check"></i>
                        <span>You have been successfully logged out.</span>
                    </div>

                    <div th:if="${param.registered}" class="alert alert-success">
                        <i class="fa-solid fa-circle-check"></i>
                        <span>Registration successful! Please log in.</span>
                    </div>

                    <!-- Login Form -->
                    <form th:action="@{/login}" method="post">
                        <!-- CSRF Token automatically added by Thymeleaf/Spring Security -->
                        <div class="form-group">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" id="email" name="email" class="form-input" placeholder="name@example.com" required autofocus>
                        </div>

                        <div class="form-group">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
                        </div>

                        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                            <i class="fa-solid fa-right-to-bracket"></i> Log In
                        </button>
                    </form>

                    <div class="auth-footer">
                        <p>Don't have an account? <a th:href="@{/register}">Register here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
