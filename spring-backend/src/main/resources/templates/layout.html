<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="header(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - Layover Explorer'">Layover Explorer</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="bg-gradient-glow"></div>

    <!-- Navigation Header -->
    <header class="navbar">
        <div class="nav-container">
            <a th:href="@{/}" class="nav-brand">
                <i class="fa-solid fa-plane-departure"></i> Layover<span>Explorer</span>
            </a>
            
            <nav style="display: flex; align-items: center; gap: 2rem;">
                <ul class="nav-links" sec:authorize="isAuthenticated()">
                    <li class="nav-item">
                        <a th:href="@{/search}"><i class="fa-solid fa-magnifying-glass"></i> Search Flights</a>
                    </li>
                    <li class="nav-item">
                        <a th:href="@{/saved}"><i class="fa-solid fa-heart"></i> Saved Flights</a>
                    </li>
                    <li class="nav-item">
                        <a th:href="@{/history}"><i class="fa-solid fa-history"></i> History</a>
                    </li>
                    <li class="nav-item">
                        <a th:href="@{/profile}"><i class="fa-solid fa-user-gear"></i> Preferences</a>
                    </li>
                </ul>

                <div class="nav-auth">
                    <!-- Anonymous User -->
                    <div sec:authorize="isAnonymous()" style="display: flex; gap: 0.75rem;">
                        <a th:href="@{/login}" class="btn btn-secondary"><i class="fa-solid fa-right-to-bracket"></i> Login</a>
                        <a th:href="@{/register}" class="btn btn-primary"><i class="fa-solid fa-user-plus"></i> Register</a>
                    </div>
                    
                    <!-- Authenticated User -->
                    <div sec:authorize="isAuthenticated()" style="display: flex; align-items: center; gap: 1rem;">
                        <span style="color: var(--text-secondary); font-size: 0.9rem;">
                            <i class="fa-solid fa-circle-user" style="color: var(--accent-cyan);"></i> 
                            <span sec:authentication="name">user@email.com</span>
                        </span>
                        <form th:action="@{/logout}" method="post" id="logoutForm" style="display:none;"></form>
                        <a href="javascript:document.getElementById('logoutForm').submit();" class="btn btn-danger">
                            <i class="fa-solid fa-right-from-bracket"></i> Logout
                        </a>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="main-content">
        <div th:replace="${content}"></div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-container">
            <p>&copy; 2026 Layover Explorer. Advanced Spring Boot MVC Monolith Project.</p>
        </div>
    </footer>
</body>
</html>
